trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: '20.x'

  # Azure Resource Manager Service Connection
  azureSubscription: 'azure-service-connection'

  # Docker Hub Service Connection
  dockerRegistryServiceConnection: 'dockerhub-service-connection'

  # Docker Hub Repository
  imageRepository: 'khalidale/nextjs-app'

  # Dockerfile Location
  dockerfilePath: 'Dockerfile'

  # Image Tag
  imageTag: '$(Build.BuildId)'

  # Azure Web App Name
  webAppName: 'my-nextjs-app'

#######################################################
# Stage 1 - Build Next.js Application
#######################################################

stages:

- stage: Build
  displayName: Build Application

  jobs:

  - job: BuildApplication
    displayName: Build Next.js

    steps:

    - checkout: self

    - task: NodeTool@0
      displayName: Install Node.js
      inputs:
        versionSpec: $(nodeVersion)

    - script: |
        npm install
      displayName: Install Dependencies

    - script: |
        npm run build
      displayName: Build Next.js

#######################################################
# Stage 2 - Build & Push Docker Image
#######################################################

- stage: Docker
  displayName: Build & Push Docker Image

  dependsOn: Build

  jobs:

  - job: DockerBuildPush
    displayName: Build and Push Image

    steps:

    - checkout: self

    - task: Docker@2
      displayName: Build and Push Docker Image

      inputs:
        command: buildAndPush
        containerRegistry: $(dockerRegistryServiceConnection)
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        tags: |
          $(imageTag)
          latest

#######################################################
# Stage 3 - Deploy to Azure Web App
#######################################################

- stage: Deploy
  displayName: Deploy to Azure Web App

  dependsOn: Docker

  jobs:

  - job: DeployContainer
    displayName: Deploy Container

    steps:

    - task: AzureWebAppContainer@1
      displayName: Deploy to Azure Web App

      inputs:
        azureSubscription: $(azureSubscription)
        appName: $(webAppName)
        containers: |
          $(imageRepository):$(imageTag)
