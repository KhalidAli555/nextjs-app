trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: '20.x'

  # Azure Service Connection
  azureSubscription: 'azure-service-connection'

  # Docker Hub Service Connection
  dockerRegistryServiceConnection: 'dockerhub-service-connection'

  # Docker Hub Repository
  imageRepository: 'yourdockerhubusername/nextjs-app'

  dockerfilePath: 'Dockerfile'

  imageTag: '$(Build.BuildId)'

  # Azure Web App Name
  webAppName: 'my-nextjs-app'

stages:

# =========================================
# Stage 1 - Build Application
# =========================================
- stage: Build
  displayName: Build Application

  jobs:
  - job: BuildApplication

    steps:
    - checkout: self

    - task: NodeTool@0
      inputs:
        versionSpec: $(nodeVersion)

    - script: |
        npm install
      displayName: Install Dependencies

    - script: |
        npm run build
      displayName: Build Next.js

# =========================================
# Stage 2 - Build Docker Image
# =========================================
- stage: DockerBuild
  displayName: Build Docker Image

  dependsOn: Build

  jobs:
  - job: BuildDocker

    steps:
    - checkout: self

    - task: Docker@2
      displayName: Build Docker Image
      inputs:
        command: build
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        tags: |
          $(imageTag)
          latest

# =========================================
# Stage 3 - Push Docker Image
# =========================================
- stage: DockerPush
  displayName: Push Docker Image

  dependsOn: DockerBuild

  jobs:
  - job: PushDocker

    steps:
    - checkout: self

    - task: Docker@2
      displayName: Push Docker Image
      inputs:
        command: push
        containerRegistry: $(dockerRegistryServiceConnection)
        repository: $(imageRepository)
        tags: |
          $(imageTag)
          latest

# =========================================
# Stage 4 - Deploy to Azure Web App
# =========================================
- stage: Deploy
  displayName: Deploy to Azure Web App

  dependsOn: DockerPush

  jobs:
  - job: DeployContainer

    steps:

    - task: AzureWebAppContainer@1
      displayName: Deploy Container to Azure Web App

      inputs:
        azureSubscription: $(azureSubscription)
        appName: $(webAppName)
        containers: |
          $(imageRepository):$(imageTag)
