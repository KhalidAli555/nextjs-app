trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:

  # Azure Service Connection
  azureSubscription: 'azure-service-connection'

  # Docker Hub Service Connection
  dockerRegistryServiceConnection: 'dockerhub-service-connection'

  # Docker Hub Repository
  imageRepository: 'khalidale/nextjs-app'

  # Dockerfile
  dockerfilePath: 'Dockerfile'

  # Image Tag
  imageTag: '$(Build.BuildId)'

  # Azure Web App Name
  webAppName: 'nextjs-webapp'

#######################################################
# Stage 1 - Build Docker Image & Push
#######################################################

stages:

- stage: Docker
  displayName: Build & Push Docker Image

  jobs:

  - job: DockerBuildPush
    displayName: Build and Push Image

    steps:

    - checkout: self

    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        command: buildAndPush
        containerRegistry: $(dockerRegistryServiceConnection)
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        tags: |
          $(imageTag)
          latest

#######################################################
# Stage 2 - Deploy
#######################################################

- stage: Deploy
  displayName: Deploy to Azure Web App

  dependsOn: Docker

  jobs:

  - job: DeployContainer
    displayName: Deploy Container

    steps:

    - task: AzureWebAppContainer@1
      displayName: Deploy to Azure Web App

      inputs:
        azureSubscription: $(azureSubscription)
        appName: $(webAppName)
        containers: |
          $(imageRepository):$(imageTag)
